{% extends "base.html" %}
{% block title %}Screener — Portfolio Intelligence{% endblock %}

{% block content %}
<div class="page-header">
  <h1>ETF Screener</h1>
</div>

<div class="tabs">
  <button class="tab-btn {% if mode != 'compare' %}active{% endif %}" onclick="switchTab('screen')">Screen vs Portfolio</button>
  <button class="tab-btn {% if mode == 'compare' %}active{% endif %}" onclick="switchTab('compare')">Head-to-Head Compare</button>
</div>

<!-- Screen tab -->
<div id="tab-screen" class="tab-panel {% if mode != 'compare' %}active{% endif %}">
  <div class="card">
    <div class="card-title">Screen a Candidate ETF</div>
    <form hx-post="/screener/results"
          hx-target="#screen-results"
          hx-swap="innerHTML"
          hx-indicator="#screen-loading">
      <div class="form-row">
        <div class="form-group">
          <label>Ticker</label>
          <input class="form-control" name="ticker" placeholder="e.g. XLE" style="text-transform:uppercase;width:100px" required>
        </div>
        <div class="form-group">
          <label>Portfolio</label>
          <select class="form-control" name="portfolio">
            {% for p in portfolios %}
            <option value="{{ p }}" {% if loop.first %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Assumed Allocation</label>
          <input class="form-control" name="allocation" type="number" step="0.01" min="0.01" max="0.5" value="0.05" style="width:90px">
        </div>
        <button class="btn" type="submit">Screen</button>
      </div>
    </form>
  </div>

  <div id="screen-loading" class="htmx-indicator">
    <div class="spinner">Computing screener analysis…</div>
  </div>
  <div id="screen-results"></div>
</div>

<!-- Compare tab -->
<div id="tab-compare" class="tab-panel {% if mode == 'compare' %}active{% endif %}">
  <div class="card">
    <div class="card-title">Compare Two ETFs Head-to-Head</div>
    <form hx-post="/screener/compare/results"
          hx-target="#compare-results"
          hx-swap="innerHTML"
          hx-indicator="#compare-loading">
      <div class="form-row">
        <div class="form-group">
          <label>Ticker A</label>
          <input class="form-control" name="ticker_a" placeholder="e.g. LIT" style="text-transform:uppercase;width:100px" required>
        </div>
        <div class="form-group">
          <label>Ticker B</label>
          <input class="form-control" name="ticker_b" placeholder="e.g. COPX" style="text-transform:uppercase;width:100px" required>
        </div>
        <button class="btn" type="submit">Compare</button>
      </div>
    </form>
  </div>

  <div id="compare-loading" class="htmx-indicator">
    <div class="spinner">Fetching comparison data…</div>
  </div>
  <div id="compare-results"></div>
</div>

{% endblock %}

{% block scripts %}
<script>
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}
</script>
{% endblock %}
