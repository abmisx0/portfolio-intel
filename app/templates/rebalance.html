{% extends "base.html" %}
{% block title %}Rebalance — Portfolio Intelligence{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Rebalancing Calculator</h1>
</div>

<div class="card">
  <div class="card-title">Rebalance Plan</div>

  <form hx-post="/rebalance/results"
        hx-target="#rebalance-results"
        hx-swap="innerHTML"
        hx-indicator="#rb-loading">
    <div class="form-row">
      <div class="form-group">
        <label>Portfolio</label>
        <select class="form-control" name="portfolio">
          {% for p in portfolios %}
          <option value="{{ p }}" {% if loop.first %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Total Portfolio Value ($)</label>
        <input class="form-control" name="value" type="number" step="1000"
               min="1000" placeholder="e.g. 100000" style="width:150px" required>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:1rem">
      <label>
        Current Allocations <span class="muted">(optional — enables drift analysis)</span>
      </label>
      <input class="form-control" name="current" style="width:100%;max-width:600px"
             placeholder="e.g. VOO:0.48,QQQ:0.32,GLD:0.10,BND:0.05,VNQ:0.05">
      <p class="muted" style="font-size:0.78rem;margin-top:0.3rem">
        Format: TICKER:weight,... — weights as decimals (0.30 = 30%). If omitted, shows target allocation only.
      </p>
    </div>

    <button class="btn" type="submit">Calculate</button>
  </form>
</div>

<div id="rb-loading" class="htmx-indicator">
  <div class="spinner">Computing rebalance plan…</div>
</div>
<div id="rebalance-results"></div>

{% endblock %}
