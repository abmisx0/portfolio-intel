<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Portfolio Intelligence{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>

<nav>
  <div class="nav-inner">
    <span class="nav-brand">Portfolio Intelligence</span>
    <div class="nav-links">
      <a href="/" class="{% if active == 'overview' %}active{% endif %}">Overview</a>
      <a href="/screener" class="{% if active == 'screener' %}active{% endif %}">Screener</a>
      <a href="/backtest" class="{% if active == 'backtest' %}active{% endif %}">Backtest</a>
      <a href="/analytics" class="{% if active == 'analytics' %}active{% endif %}">Analytics</a>
      <a href="/watchlist" class="{% if active == 'watchlist' %}active{% endif %}">Watchlist</a>
      <a href="/rebalance" class="{% if active == 'rebalance' %}active{% endif %}">Rebalance</a>
      <a href="/insights" class="{% if active == 'insights' %}active{% endif %}">Insights</a>
    </div>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}

</body>
</html>
