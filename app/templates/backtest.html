{% extends "base.html" %}
{% block title %}Backtest — Portfolio Intelligence{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Backtest</h1>
</div>

<div class="card">
  <div class="card-title">Compare Two Portfolios</div>
  <form hx-post="/backtest/results"
        hx-target="#backtest-results"
        hx-swap="innerHTML"
        hx-indicator="#bt-loading">
    <div class="form-row">
      <div class="form-group">
        <label>Portfolio A</label>
        <select class="form-control" name="portfolio_a">
          {% for p in portfolios %}
          <option value="{{ p }}" {% if loop.first %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Portfolio B</label>
        <select class="form-control" name="portfolio_b">
          {% for p in portfolios %}
          <option value="{{ p }}" {% if loop.index == 2 %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Start Date</label>
        <input class="form-control" name="start" type="date" value="2020-01-01">
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input class="form-control" name="end" type="date" placeholder="today">
      </div>
      <div class="form-group">
        <label>Include VOO Benchmark</label>
        <select class="form-control" name="benchmark" style="width:80px">
          <option value="true" selected>Yes</option>
          <option value="false">No</option>
        </select>
      </div>
      <button class="btn" type="submit">Run Backtest</button>
    </div>
  </form>
</div>

<div id="bt-loading" class="htmx-indicator">
  <div class="spinner">Running backtest…</div>
</div>
<div id="backtest-results"></div>

{% endblock %}
